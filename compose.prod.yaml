services:
  predictions:
    image: ghcr.io/helga-agentur/worldcup-predictions:main
    working_dir: /app
    # The host has 3.8G RAM + 8G swap. Cap the batch container below host RAM
    # so a memory spike degrades into swap and a clean container kill instead
    # of a host-wide OOM that starves Caddy (incident 2026-07-09).
    mem_limit: 3g
    memswap_limit: 6g
    volumes:
      - ./data:/app/data
      - ./public:/app/public
      - ./reports:/app/reports
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src
      ODDS_API_KEY: ${ODDS_API_KEY:-}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY:-}
      KAGGLE_API_TOKEN: ${KAGGLE_API_TOKEN:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      GTM_CONTAINER_ID: ${GTM_CONTAINER_ID:-}
      BASE_URL: ${BASE_URL:-}
    command: worldcup-predictions --help
