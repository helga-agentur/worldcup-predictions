services:
  predictions:
    image: ghcr.io/helga-agentur/worldcup-predictions:main
    working_dir: /app
    volumes:
      - ./data:/app/data
      - ./public:/app/public
      - ./reports:/app/reports
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app/src
      ODDS_API_KEY: ${ODDS_API_KEY:-}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY:-}
      KAGGLE_API_TOKEN: ${KAGGLE_API_TOKEN:-}
      NEWS_API_KEY: ${NEWS_API_KEY:-}
      GTM_CONTAINER_ID: ${GTM_CONTAINER_ID:-}
      BASE_URL: ${BASE_URL:-}
    command: worldcup-predictions --help
