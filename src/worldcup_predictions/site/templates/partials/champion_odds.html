{% macro champion_bars(entries) -%}
<div class="odds-list">
  {% for entry in entries %}
  <div class="odds-row">
    <span class="odds-team">{% if entry.flag %}<span aria-hidden="true">{{ entry.flag }}</span> {% endif %}{{ entry.label }}</span>
    <span class="odds-track" aria-hidden="true"><span class="odds-fill" style="width: {{ entry.width }}%"></span></span>
    <span class="odds-pct numeric">{{ entry.percent_text }}</span>
  </div>
  {% endfor %}
</div>
{%- endmacro %}
