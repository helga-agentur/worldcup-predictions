{% macro match_name(row, class_name="match-name", show_flags=True) -%}
<span class="{{ class_name }}">
  <span class="match-name__team" data-side="home">{% if show_flags and row.home_flag %}<span class="match-name__flag" aria-hidden="true">{{ row.home_flag }}</span>&nbsp;{% endif %}<span class="match-name__label">{{ row.home_team_label }}</span></span>
  <span class="match-name__separator">-</span>
  <span class="match-name__team" data-side="away">{% if show_flags and row.away_flag %}<span class="match-name__flag" aria-hidden="true">{{ row.away_flag }}</span>&nbsp;{% endif %}<span class="match-name__label">{{ row.away_team_label }}</span></span>
</span>
{%- endmacro %}
