<!doctype html>
<html lang="{{ locale }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <meta name="description" content="{{ description }}">
  <link rel="canonical" href="{{ current_url }}">
  {% for alternate in alternate_links %}
  <link rel="alternate" hreflang="{{ alternate.locale }}" href="{{ alternate.href }}">
  {% endfor %}
  <script>
    (function () {
      var match = document.cookie.match(/(?:^|; )helga_theme=(dark|light)/);
      var theme = match ? match[1] : (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.dataset.theme = theme;
      document.documentElement.style.colorScheme = theme;
      document.cookie = "{{ language_cookie_name }}={{ locale }}; Path=/; Max-Age=31536000; SameSite=Lax";
    })();
  </script>
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="{{ asset_css }}">
  <script src="{{ asset_js }}" defer></script>
  {% if gtm_container_id %}
  <script>
    (function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
    j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','{{ gtm_container_id }}');
  </script>
  {% endif %}
</head>
<body>
  {% if gtm_container_id %}
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id={{ gtm_container_id }}" height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
  {% endif %}
  {% include "partials/header.html" %}
  <main id="content">
    {% block content %}{% endblock %}
  </main>
  {% include "partials/footer.html" %}
</body>
</html>
